<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <link rel="stylesheet" href="css/styles.css"> <!-- Link to your CSS file -->
</head>
<body>
    <header>
        <h1>Chardonnay Chateau</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Sign Up</h1>
        <form method="post">
            <div>
                <label for="user-first-name">First Name:</label>
                <input type="text" id="user-first-name" name="user-first-name" placeholder="First Name" required>
            </div>
            <div>
                <label for="user-last-name">Last Name:</label>
                <input type="text" id="user-last-name" name="user-last-name" placeholder="Last Name">
            </div>
            <div>
                <label for="user-email">Email:</label>
                <input type="email" id="user-email" name="user-email" placeholder="Email" required>
            </div>
            <div>
                <label for="user-password">Password:</label>
                <input type="password" id="user-password" name="user-password" placeholder="Password" required minlength="6">
            </div>
            <div>
                <input type="password" id="user_confirm_password" name="user_confirm_password">
            </div>
            <div>
                <button type="submit">Sign Up</button>
            </div>
        </form>
        <style>
            input:focus:invalid {
                border: 2px solid red;
            }
        </style>

    </main>
    <footer>
        <p>&copy; 2023 Your Name. All rights reserved.</p>
    </footer>
    <script src="js/script.js"></script> <!-- Link to your JavaScript file -->
</body>
</html>
